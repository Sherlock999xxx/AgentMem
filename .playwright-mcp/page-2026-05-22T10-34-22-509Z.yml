          - heading "Memory" [level=1] [ref=e174]
          - paragraph [ref=e175]: Understand Letta Code's self-improving memory system
        - generic [ref=e176]:
          - generic [ref=e177]:
            - paragraph [ref=e178]: With Letta Code, you use the same agent indefinitely - across sessions, days, or months - and have it get better over time. Your agent remembers past interactions, learns your preferences, and self-edits its memory as it works.
            - paragraph [ref=e179]:
              - text: Letta Code also allows you to customize your agent’s personality. With Claude Code or Codex, every user gets the same agent that acts identically. With Letta Code, you can deeply personalize your agents to be unique to
              - emphasis [ref=e180]: you
              - text: .
            - generic [ref=e181]:
              - heading "Agents and conversations" [level=2] [ref=e182]
              - link "Section titled “Agents and conversations”" [ref=e183] [cursor=pointer]:
                - /url: "#agents-and-conversations"
                - img [ref=e185]
                - generic [ref=e187]: Section titled “Agents and conversations”
            - paragraph [ref=e188]:
              - text: "In Letta Code, there are two important session concepts:"
              - strong [ref=e189]: agents
              - text: and
              - strong [ref=e190]: conversations
              - text: .
            - list [ref=e191]:
              - listitem [ref=e192]:
                - text: An
                - strong [ref=e193]: agent
                - text: is an entity with a name, memories, a model configuration, messages, and other state.
              - listitem [ref=e194]:
                - text: A
                - strong [ref=e195]: conversation
                - text: is a message thread (or “session”) with an agent. You can have many parallel conversations with a single agent. Every agent also has a “default conversation” or “main chat”.
            - paragraph [ref=e196]:
              - text: When you run the
              - code [ref=e197]: letta
              - text: CLI command in a project directory, Letta Code resumes the default conversation with your last used agent. In the Letta Code desktop app, the left sidebar is sorted by agents, and you can see conversations sorted by activity date.
            - paragraph [ref=e198]:
              - text: If you want to run many CLI sessions with a single agent in parallel (eg in separate terminal windows), use
              - code [ref=e199]: letta --new
              - text: to start a new conversation. In the desktop app, simply press the notepad icon to start a new conversation.
            - paragraph [ref=e200]:
              - text: Letta Code has a default agent pre-installed (called “Letta Code”). To swap agents in the CLI, use
              - code [ref=e201]: /agents
              - text: . You can favorite an agent in the CLI with “/pin”, or by clicking the favorites button in the desktop app.
            - generic [ref=e202]:
              - heading "Initializing your agent’s memory" [level=2] [ref=e203]
              - link "Section titled “Initializing your agent’s memory”" [ref=e204] [cursor=pointer]:
                - /url: "#initializing-your-agents-memory"
                - img [ref=e206]
                - generic [ref=e208]: Section titled “Initializing your agent’s memory”
            - paragraph [ref=e209]:
              - text: When you run
              - code [ref=e210]: /init
              - text: ", Letta Code performs an interactive initialization in the main conversation, guided by context constitution principles for durable identity, preferences, and project structure. Letta Code will read from prior Claude Code and OpenAI Codex sessions to learn about your working style and past + ongoing projects using"
              - link "subagents" [ref=e211] [cursor=pointer]:
                - /url: /letta-code/subagents
              - text: .
            - paragraph [ref=e212]:
              - text: Run
              - code [ref=e213]: /init
              - text: again whenever you want the agent to re-analyze your project, such as after major changes or adding documentation that you want the agent to ingest.
            - paragraph [ref=e214]:
              - text: If your memory structure has drifted or become messy over time, run
              - code [ref=e215]: /doctor
              - text: to audit the current memory layout and refine it for proper memory placement and efficient token usage.
            - generic [ref=e216]:
              - heading "Manually triggering memory updates" [level=2] [ref=e217]
              - link "Section titled “Manually triggering memory updates”" [ref=e218] [cursor=pointer]:
                - /url: "#manually-triggering-memory-updates"
                - img [ref=e220]
                - generic [ref=e222]: Section titled “Manually triggering memory updates”
            - paragraph [ref=e223]:
              - text: Your Letta Code agent can self-edit its own memory, and will use the context of the conversation to decide when to edit its memory (for example, to store new information learned in a session). In some cases, you may want to actively direct your agent to remember something via the
              - code [ref=e224]: /remember
              - text: command.
            - paragraph [ref=e225]: "For example, if you noticed your agent made an easily avoidable mistake, you can give direct guidance:"
            - figure "Terminal window" [ref=e227]:
              - generic [ref=e230]: Terminal window
              - code [ref=e232]:
                - generic [ref=e234]: "> /remember not to make that mistake again"
              - button "Copy to clipboard" [ref=e236] [cursor=pointer]
            - paragraph [ref=e237]:
              - text: You can also use the
              - code [ref=e238]: /remember
              - text: command without any extra prompting, and the agent will infer your intent from the context to make a memory edit.
            - complementary [ref=e239]:
              - img [ref=e240]
              - paragraph [ref=e243]: If your agent is not consistently remembering important information, ask the agent to update its policies to be more diligent in the future, and communicate what information you expect it to store. For example, “Actively store information about my preferences, decisions, and anything I explicitly ask you to remember.”
            - generic [ref=e244]:
              - heading "Configuring dreaming (reflection)" [level=2] [ref=e245]
              - link "Section titled “Configuring dreaming (reflection)”" [ref=e246] [cursor=pointer]:
                - /url: "#configuring-dreaming-reflection"
                - img [ref=e248]
                - generic [ref=e250]: Section titled “Configuring dreaming (reflection)”
            - paragraph [ref=e251]: To improve proactive memory creation and consolidation, Letta Code launches periodic sleep-time (dream) subagents to reflect on your recent conversations and interactions. These agents are launched in the background, and generally run for many steps since the subagents are thorough memory editors.
            - paragraph [ref=e252]:
              - text: You can use the
              - code [ref=e253]: /sleeptime
              - text: command in the CLI to configure your reflection settings, or by clicking the sleeping alien icon in the bottom-right of the app.
            - paragraph [ref=e254]:
              - text: The
              - strong [ref=e255]: trigger
              - text: "determines how often the reflection subagent is auto-launched:"
            - list [ref=e256]:
              - listitem [ref=e257]:
                - code [ref=e258]: "Off"
                - text: ": select to disable reflection subagents"
              - listitem [ref=e259]:
                - code [ref=e260]: Step count
                - text: ": launch a reflection subagent every N user messages"
              - listitem [ref=e261]:
                - code [ref=e262]: Compaction event
                - text: "(recommended, MemFS only): launch a reflection subagent when the context window is compacted / summarized"
            - paragraph [ref=e263]: When a dream trigger fires, Letta Code launches the dream subagent in the background automatically.
            - complementary [ref=e264]:
              - img [ref=e265]
              - paragraph [ref=e268]:
                - text: Dream/reflection subagents in Letta Code are
                - emphasis [ref=e269]: not
                - text: the same thing as server-side sleep-time (the
                - code [ref=e270]: enable_sleeptime
                - text: setting in agent config). Do not mix the two.
            - generic [ref=e271]:
              - heading "How Letta Code’s memory system works" [level=2] [ref=e272]
              - link "Section titled “How Letta Code’s memory system works”" [ref=e273] [cursor=pointer]:
                - /url: "#how-letta-codes-memory-system-works"
                - img [ref=e275]
                - generic [ref=e277]: Section titled “How Letta Code’s memory system works”
            - complementary [ref=e278]:
              - img [ref=e279]
              - generic [ref=e281]:
                - paragraph [ref=e282]:
                  - text: MemFS (
                  - link "context repositories" [ref=e283] [cursor=pointer]:
                    - /url: https://www.letta.com/blog/context-repositories
                  - text: ) is available in Letta Code version 0.15 and later. All new agents have MemFS enabled by default.
                - paragraph [ref=e284]:
                  - text: To enable MemFS on an older agent, run
                  - code [ref=e285]: /memfs enable
                  - text: .
            - complementary [ref=e286]:
              - img [ref=e287]
              - paragraph [ref=e290]: MemFS is only available through the Letta API. If you are using a Docker server, your agent will use the legacy memory blocks system.
            - paragraph [ref=e291]:
              - text: Your agent’s memory is stored in a git-backed filesystem called
              - strong [ref=e292]: MemFS
              - text: (short for “memory filesystem”), also known as a
              - link "context repository" [ref=e293] [cursor=pointer]:
                - /url: https://www.letta.com/blog/context-repositories
              - text: . Memory is organized as a directory of markdown files, cloned locally to
              - code [ref=e294]: ~/.letta/agents/<your-agent-id>/memory
              - text: . Your agent edits these files directly using its bash tools, then commits and pushes to save changes — giving you a full version history of everything your agent has learned.
            - paragraph [ref=e295]:
              - text: Files in the
              - code [ref=e296]: system/
              - text: directory are always loaded in full into the agent’s system prompt. Files outside
              - code [ref=e297]: system/
              - text: are visible to the agent via the memory tree (filenames and descriptions), but their contents are not automatically loaded — keeping the context window lean.
            - paragraph [ref=e298]:
              - text: For a full explanation of the MemFS file format, the
              - code [ref=e299]: system/
              - text: hierarchy, git synchronization, and the
              - code [ref=e300]: letta memory
              - text: CLI subcommands, see the
              - link "MemFS reference" [ref=e301] [cursor=pointer]:
                - /url: /letta-code/memfs
              - text: .
