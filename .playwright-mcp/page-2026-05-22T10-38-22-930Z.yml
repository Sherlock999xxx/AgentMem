            - generic [ref=e319]: "Mem0 separates memory into layers so agents remember the right detail at the right time. Think of it like a notebook: a sticky note for the current task, a daily journal for the session, and an archive for everything a user has shared."
            - generic [ref=e320]:
              - img "Info" [ref=e322]
              - generic [ref=e324]:
                - strong [ref=e326]: Why it matters
                - list [ref=e327]:
                  - listitem [ref=e328]: Keeps conversations coherent without repeating instructions.
                  - listitem [ref=e329]: Lets agents personalize responses based on long-term preferences.
                  - listitem [ref=e330]: Avoids over-fetching data by scoping memory to the correct layer.
            - heading "Navigate to header Key terms" [level=2] [ref=e331]:
              - link "Navigate to header" [ref=e332] [cursor=pointer]:
                - /url: "#key-terms"
                - img [ref=e334]
              - generic [ref=e336] [cursor=pointer]: Key terms
            - list [ref=e337]:
              - listitem [ref=e338]:
                - strong [ref=e339]: Conversation memory
                - text: – In-flight messages inside a single turn (what was just said).
              - listitem [ref=e340]:
                - strong [ref=e341]: Session memory
                - text: – Short-lived facts that apply for the current task or channel.
              - listitem [ref=e342]:
                - strong [ref=e343]: User memory
                - text: – Long-lived knowledge tied to a person, account, or workspace.
              - listitem [ref=e344]:
                - strong [ref=e345]: Organizational memory
                - text: – Shared context available to multiple agents or teams.
            - generic:
              - img "Mermaid diagram"
            - heading "Navigate to header Short-term vs long-term memory" [level=2] [ref=e346]:
              - link "Navigate to header" [ref=e347] [cursor=pointer]:
                - /url: "#short-term-vs-long-term-memory"
                - img [ref=e349]
              - generic [ref=e351] [cursor=pointer]: Short-term vs long-term memory
            - generic [ref=e352]: "Short-term memory keeps the current conversation coherent. It includes:"
            - list [ref=e353]:
              - listitem [ref=e354]:
                - strong [ref=e355]: Conversation history
                - text: – recent turns in order so the agent remembers what was just said.
              - listitem [ref=e356]:
                - strong [ref=e357]: Working memory
                - text: – temporary state such as tool outputs or intermediate calculations.
              - listitem [ref=e358]:
                - strong [ref=e359]: Attention context
                - text: – the immediate focus of the assistant, similar to what a person holds in mind mid-sentence.
            - generic [ref=e360]: "Long-term memory preserves knowledge across sessions. It captures:"
            - list [ref=e361]:
              - listitem [ref=e362]:
                - strong [ref=e363]: Factual memory
                - text: – user preferences, account details, and domain facts.
              - listitem [ref=e364]:
                - strong [ref=e365]: Episodic memory
                - text: – summaries of past interactions or completed tasks.
              - listitem [ref=e366]:
                - strong [ref=e367]: Semantic memory
                - text: – relationships between concepts so agents can reason about them later.
            - generic [ref=e368]: Mem0 maps these classic categories onto its layered storage so you can decide what should fade quickly versus what should last for months.
